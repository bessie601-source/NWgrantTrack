<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>North West NSW Grant Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* One Tree Locale Brand Colours — from brand palette (Slide2) */
    :root {
      /* Core palette */
      --otl-pale-sage: #d0ddb9;
      --otl-sage:      #5d7c41;
      --otl-green:     #9cb86c;
      --otl-sky:       #6569a0;
      --otl-blue:      #515a97;
      --otl-pale-pink: #f2dee9;
      --otl-pink:      #c779a1;
      --otl-fuchsia:   #d00670;
      --otl-purple:    #3b2a5e;
      --otl-violet:    #79447f;
      --otl-grape:     #543772;
      --otl-dark-grey: #494258;

      /* Semantic roles (names kept for backwards compatibility) */
      --otl-forest:   #3b2a5e;  /* deep anchor — was forest green, now purple */
      --otl-olive:    #5d7c41;  /* mid green */
      --otl-gold:     #d00670;  /* accent/CTA — was gold, now fuchsia */
      --otl-earth:    #543772;  /* secondary deep — grape */
      --otl-sand:     #d0ddb9;  /* light fill — pale sage */
      --otl-cream:    #f2dee9;  /* page background — pale pink */
      --otl-charcoal: #494258;  /* body text — dark grey */
      --otl-muted:    #79447f;  /* muted text — violet */

      /* Status */
      --otl-urgent:   #d00670;
      --otl-warning:  #c779a1;
      --otl-success:  #5d7c41;

      /* Aliases used in markup */
      --color-forest: var(--otl-forest);
      --color-muted:  var(--otl-muted);

      --shadow:    0 2px 8px rgba(59, 42, 94, 0.08);
      --shadow-lg: 0 4px 20px rgba(59, 42, 94, 0.14);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--otl-cream);
      color: var(--otl-charcoal);
      line-height: 1.6;
    }

    h1, h2, h3 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; }

    .header {
      background: linear-gradient(135deg, var(--otl-forest) 0%, var(--otl-olive) 100%);
      color: white;
      padding: 2.5rem 2rem;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--otl-gold), var(--otl-sand), var(--otl-gold));
    }

    .header-content { max-width: 1200px; margin: 0 auto; }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .header p { color: var(--otl-sand); font-size: 1rem; }

    .stats-bar {
      background: white;
      border-bottom: 2px solid var(--otl-sand);
      padding: 1.25rem 2rem;
    }

    .stats-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
    }

    .stat { display: flex; align-items: center; gap: 0.75rem; }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--otl-forest); font-family: 'Playfair Display', serif; }
    .stat-label { font-size: 0.875rem; color: var(--otl-muted); }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--otl-sand);
    }

    .tab {
      padding: 0.875rem 1.5rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--otl-muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .tab:hover { color: var(--otl-forest); }
    .tab.active { color: var(--otl-forest); border-bottom-color: var(--otl-gold); }

    .actions-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .btn {
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--otl-forest);
      color: white;
    }

    .btn-primary:hover { background: var(--otl-olive); }

    .btn-secondary {
      background: white;
      color: var(--otl-earth);
      border: 1.5px solid var(--otl-sand);
    }

    .btn-secondary:hover { background: var(--otl-cream); border-color: var(--otl-olive); }

    .btn-gold {
      background: var(--otl-gold);
      color: white;
    }

    .btn-gold:hover { background: #a80559; }

    .btn-filter {
      background: white;
      color: var(--otl-earth);
      border: 1.5px solid var(--otl-sand);
    }

    .btn-filter.active {
      background: var(--otl-forest);
      color: white;
      border-color: var(--otl-forest);
    }

    .btn-small { padding: 0.5rem 1rem; font-size: 0.8rem; }

    .card {
      background: white;
      border-radius: 0.75rem;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--otl-sand);
    }

    .grant-list { display: flex; flex-direction: column; }

    .grant-item {
      padding: 1.5rem;
      border-bottom: 1px solid var(--otl-sand);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1.25rem;
      align-items: start;
      transition: all 0.2s;
    }

    .grant-item:hover { background: linear-gradient(90deg, white, var(--otl-cream)); }
    .grant-item:last-child { border-bottom: none; }

    .grant-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .grant-title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--otl-forest);
    }

    .grant-funder {
      font-size: 0.75rem;
      color: var(--otl-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .grant-description {
      font-size: 0.9rem;
      color: var(--otl-earth);
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }

    .grant-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.875rem;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      color: var(--otl-muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-urgent { background: #FEF2F2; color: var(--otl-urgent); }
    .badge-warning { background: #FEFBE8; color: var(--otl-warning); }
    .badge-soon { background: var(--otl-pale-sage); color: var(--otl-blue); }
    .badge-open { background: #F0FDF4; color: var(--otl-success); }
    .badge-closed { background: #F3F4F6; color: var(--otl-muted); }
    .badge-funded { background: #F0FDF4; color: var(--otl-success); }
    .badge-category { background: var(--otl-pale-pink); color: var(--otl-grape); }
    .badge-eligibility { background: var(--otl-pale-pink); color: var(--otl-violet); }
    .badge-eligibility.individual { background: var(--otl-pale-sage); color: #3d5429; }
    .badge-eligibility.nfp { background: var(--otl-pale-sage); color: var(--otl-blue); }
    .badge-eligibility.partnership { background: var(--otl-pale-pink); color: #96044f; }
    .badge-proposal { background: var(--otl-gold); color: white; }

    .grant-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .amount {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--otl-forest);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--otl-muted);
    }

    /* Modal styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(73, 66, 88, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 1rem;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 1rem;
      max-width: 750px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .modal.wide { max-width: 950px; }

    .modal-header {
      padding: 1.75rem;
      border-bottom: 2px solid var(--otl-sand);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(90deg, white, var(--otl-cream));
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--otl-forest);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.75rem;
      cursor: pointer;
      color: var(--otl-muted);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .modal-close:hover { background: var(--otl-sand); color: var(--otl-forest); }

    .modal-body { padding: 1.75rem; }
    .modal-footer {
      padding: 1.25rem 1.75rem;
      border-top: 2px solid var(--otl-sand);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      background: var(--otl-cream);
    }

    .form-group { margin-bottom: 1.5rem; }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--otl-forest);
      margin-bottom: 0.5rem;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--otl-sand);
      border-radius: 0.5rem;
      font-size: 0.9rem;
      transition: all 0.2s;
      background: white;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--otl-olive);
      box-shadow: 0 0 0 3px rgba(93, 124, 65, 0.18);
    }

    .form-textarea { min-height: 120px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

    /* Document folder styles */
    .doc-section { margin-top: 2rem; }
    .doc-section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--otl-forest);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Playfair Display', serif;
    }
    .doc-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .doc-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--otl-cream);
      border-radius: 0.5rem;
      font-size: 0.875rem;
      border: 1px solid var(--otl-sand);
    }
    .doc-item svg { flex-shrink: 0; color: var(--otl-olive); }
    .doc-name { flex: 1; color: var(--otl-earth); }
    .doc-actions { display: flex; gap: 0.5rem; }
    .doc-add {
      border: 2px dashed var(--otl-sand);
      padding: 1.25rem;
      text-align: center;
      border-radius: 0.5rem;
      cursor: pointer;
      color: var(--otl-muted);
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .doc-add:hover {
      border-color: var(--otl-olive);
      color: var(--otl-forest);
      background: rgba(93, 124, 65, 0.07);
    }

    /* Grant detail view */
    .detail-section { margin-bottom: 1.75rem; }
    .detail-section h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--otl-forest);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      font-family: 'Playfair Display', serif;
    }
    .detail-section p {
      font-size: 0.9rem;
      color: var(--otl-earth);
      line-height: 1.7;
    }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .detail-item {
      background: var(--otl-cream);
      padding: 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--otl-sand);
    }
    .detail-label {
      font-size: 0.75rem;
      color: var(--otl-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
    }
    .detail-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--otl-forest);
    }

    /* Calendar view */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--otl-sand);
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .calendar-header {
      background: var(--otl-forest);
      color: white;
      padding: 0.875rem;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .calendar-day {
      background: white;
      min-height: 110px;
      padding: 0.625rem;
      position: relative;
    }

    .calendar-day-number {
      font-size: 0.875rem;
      color: var(--otl-forest);
      margin-bottom: 0.35rem;
      font-weight: 600;
    }

    .calendar-day.other-month {
      background: var(--otl-cream);
      color: var(--otl-muted);
    }

    .calendar-event {
      background: var(--otl-forest);
      color: white;
      font-size: 0.75rem;
      padding: 0.35rem 0.5rem;
      border-radius: 0.25rem;
      margin-bottom: 0.35rem;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-event.urgent { background: var(--otl-urgent); }
    .calendar-event.warning { background: var(--otl-warning); color: var(--otl-charcoal); }
    .calendar-event.proposal { background: var(--otl-gold); }

    /* Template cards */
    .template-card {
      background: linear-gradient(135deg, white, var(--otl-cream));
      border: 2px solid var(--otl-sand);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }

    .template-card:hover {
      border-color: var(--otl-olive);
      box-shadow: var(--shadow);
    }

    .template-card h4 {
      font-family: 'Playfair Display', serif;
      color: var(--otl-forest);
      margin-bottom: 0.75rem;
      font-size: 1.1rem;
    }

    .template-card ol {
      padding-left: 1.25rem;
      color: var(--otl-earth);
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .template-card .tip {
      margin-top: 1rem;
      padding: 0.875rem;
      background: rgba(208, 6, 112, 0.08);
      border-left: 3px solid var(--otl-gold);
      border-radius: 0 0.5rem 0.5rem 0;
      font-size: 0.85rem;
      color: var(--otl-earth);
    }

    @media (max-width: 768px) {
      .header h1 { font-size: 1.75rem; }
      .grant-item { grid-template-columns: 1fr; }
      .grant-actions { align-items: flex-start; }
      .form-row { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .tabs { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>North West NSW Grant Tracker</h1>
      <p>Organize funding opportunities for environmental and community resilience projects</p>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stats-content">
      <div class="stat">
        <span class="stat-value" id="stat-open">0</span>
        <span class="stat-label">Open Opportunities</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-closing">0</span>
        <span class="stat-label">Closing Soon</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-tracked">0</span>
        <span class="stat-label">Total Tracked</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-avg">$0</span>
        <span class="stat-label">Avg. Grant Size</span>
      </div>
    </div>
  </div>

  <main class="container">
    <div class="tabs">
      <button class="tab active" data-tab="opportunities">Opportunities</button>
      <button class="tab" data-tab="pipeline">My Pipeline</button>
      <button class="tab" data-tab="calendar">Calendar</button>
      <button class="tab" data-tab="templates">Templates</button>
      <button class="tab" data-tab="proposals">Unsolicited Proposals</button>
    </div>

    <div class="actions-bar">
      <div class="filter-group">
        <button class="btn btn-filter active" data-filter="all">All</button>
        <button class="btn btn-filter" data-filter="open">Open</button>
        <button class="btn btn-filter" data-filter="closing">Closing Soon</button>
        <button class="btn btn-filter" data-filter="eligible-individual">Individual Eligible</button>
      </div>
      <button class="btn btn-primary" id="add-grant-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Add Grant
      </button>
    </div>

    <div class="card">
      <div id="opportunities-view" class="view">
        <div class="grant-list" id="grant-list"></div>
      </div>

      <div id="pipeline-view" class="view" style="display: none;">
        <div class="grant-list" id="pipeline-list"></div>
      </div>

      <div id="calendar-view" class="view" style="display: none;">
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>

      <div id="templates-view" class="view" style="display: none;">
        <div id="templates-list"></div>
      </div>

      <div id="proposals-view" class="view" style="display: none;">
        <div id="proposals-list"></div>
      </div>
    </div>
  </main>

  <!-- Add/Edit Grant Modal -->
  <div class="modal-overlay" id="grant-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Add Grant Opportunity</h2>
        <button class="modal-close" id="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="grant-form">
          <div class="form-group">
            <label class="form-label">Grant Name *</label>
            <input type="text" class="form-input" name="name" required>
          </div>

          <div class="form-group">
            <label class="form-label">Funder / Organization *</label>
            <input type="text" class="form-input" name="funder" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Category</label>
              <select class="form-select" name="category">
                <option value="environmental">Environmental</option>
                <option value="community">Community</option>
                <option value="indigenous">Indigenous</option>
                <option value="landcare">Landcare</option>
                <option value="drought">Drought Resilience</option>
                <option value="flood">Flood Recovery</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Eligibility *</label>
              <select class="form-select" name="eligibility" required>
                <option value="individual">Individual/Sole Trader</option>
                <option value="nfp">NFP/Incorporated</option>
                <option value="partnership">Partnership Required</option>
                <option value="social-enterprise">Social Enterprise</option>
                <option value="aboriginal-only">Aboriginal Org Only</option>
                <option value="business">Business/Company</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Grant Amount</label>
              <input type="text" class="form-input" name="amount" placeholder="$5,000 - $20,000">
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-select" name="status">
                <option value="open">Open</option>
                <option value="opening_soon">Opening Soon</option>
                <option value="closing_soon">Closing Soon</option>
                <option value="closed">Closed</option>
                <option value="draft">Draft</option>
                <option value="submitted">Submitted</option>
                <option value="funded">Funded</option>
                <option value="rejected">Rejected</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Opening Date</label>
              <input type="date" class="form-input" name="openDate">
            </div>
            <div class="form-group">
              <label class="form-label">Closing Date *</label>
              <input type="date" class="form-input" name="closeDate" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Short Description</label>
            <textarea class="form-textarea" name="description" placeholder="Brief overview of what this grant funds..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Detailed Eligibility Criteria</label>

    function updateStats() {
      const open = grants.filter(g => ['open', 'opening_soon'].includes(g.status)).length;
      const closing = grants.filter(g => {
        const days = getDaysUntil(g.closeDate);
        return ['open', 'closing_soon'].includes(g.status) && days <= 30 && days >= 0;
      }).length;
      const total = grants.length;
      const amounts = grants.map(g => {
        const match = g.amount.match(/[\d,]+/g);
        return match ? parseInt(match[match.length - 1].replace(/,/g, '')) : 0;
      }).filter(a => a > 0);
      const avg = amounts.length ? Math.round(amounts.reduce((a,b) => a+b, 0) / amounts.length) : 0;

      document.getElementById('stat-open').textContent = open;
      document.getElementById('stat-closing').textContent = closing;
      document.getElementById('stat-tracked').textContent = total;
      document.getElementById('stat-avg').textContent = '$' + avg.toLocaleString();
    }

    function getDaysUntil(dateStr) {
      const target = new Date(dateStr);
      const today = new Date();
      today.setHours(0,0,0,0);
      return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    }

    function getStatusBadge(grant) {
      const days = getDaysUntil(grant.closeDate);
      if (grant.status === 'funded') return '<span class="badge badge-funded">Funded</span>';
      if (grant.status === 'rejected') return '<span class="badge badge-closed">Not Successful</span>';
      if (grant.status === 'submitted') return '<span class="badge badge-soon">Submitted</span>';
      if (grant.status === 'draft') return '<span class="badge badge-warning">Draft</span>';
      if (days < 0) return '<span class="badge badge-closed">Closed</span>';
      if (days <= 7) return '<span class="badge badge-urgent">Closes in ' + days + ' days</span>';
      if (days <= 30) return '<span class="badge badge-warning">Closes in ' + days + ' days</span>';
      return '<span class="badge badge-open">Open</span>';
    }

    function getCategoryBadge(cat) {
      const labels = { environmental: 'Environmental', community: 'Community', indigenous: 'Indigenous', landcare: 'Landcare', drought: 'Drought', flood: 'Flood', other: 'Other' };

    }

      const labels = {
        individual: 'Individual OK',
        nfp: 'NFP Required',
        partnership: 'Partnership',

        'aboriginal-only': 'Aboriginal Org',
        business: 'Business'
      };
      const classes = {
        individual: 'individual',
        nfp: 'nfp',
        partnership: 'partnership'
      };
      return '<span class="badge badge-eligibility ' + (classes[el] || '') + '">' + (labels[el] || el) + '</span>';
    }

    function renderGrants() {
      let filtered = grants;
      if (currentFilter === 'open') {
        filtered = grants.filter(g => ['open', 'opening_soon'].includes(g.status));
      } else if (currentFilter === 'closing') {
        filtered = grants.filter(g => {
          const days = getDaysUntil(g.closeDate);
          return ['open', 'closing_soon'].includes(g.status) && days <= 30 && days >= 0;
        });
      } else if (currentFilter === 'eligible-individual') {
        filtered = grants.filter(g => ['individual', 'partnership'].includes(g.eligibility));
      }
      filtered.sort((a, b) => new Date(a.closeDate) - new Date(b.closeDate));

      if (filtered.length === 0) {
        grantList.innerHTML = '<div class="empty-state"><p>No grants match your filter</p></div>';
        return;
      }

      grantList.innerHTML = filtered.map(grant => `
        <div class="grant-item" data-id="${grant.id}">
          <div class="grant-info">
            <div class="grant-header">
              <span class="grant-title">${grant.name}</span>
              ${getStatusBadge(grant)}
              ${getCategoryBadge(grant.category)}
              ${getEligibilityBadge(grant.eligibility)}
            </div>
            <span class="grant-funder">${grant.funder}</span>
            <p class="grant-description">${grant.description}</p>

    function renderCalendar() {
      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();
      const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      let html = dayNames.map(d => `<div class="calendar-header">${d}</div>`).join('');
      for (let i = firstDay - 1; i >= 0; i--) {
        html += `<div class="calendar-day other-month"><div class="calendar-day-number">${daysInPrevMonth - i}</div></div>`;
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const dayGrants = grants.filter(g => {
          const close = new Date(g.closeDate);
          return close.getDate() === day && close.getMonth() === month;
        });
        html += `<div class="calendar-day">
          <div class="calendar-day-number">${day}</div>
          ${dayGrants.map(g => {
            const daysLeft = getDaysUntil(g.closeDate);
            let cls = '';
            if (daysLeft <= 7) cls = 'urgent';
            else if (daysLeft <= 30) cls = 'warning';
            return `<div class="calendar-event ${cls}" onclick="viewGrant(${g.id})" title="${g.name}">${g.name}</div>`;
          }).join('')}
        </div>`;
      }
      const remaining = (7 - ((firstDay + daysInMonth) % 7)) % 7;
      for (let day = 1; day <= remaining; day++) {
        html += `<div class="calendar-day other-month"><div class="calendar-day-number">${day}</div></div>`;
      }
      calendarGrid.innerHTML = html;
    }

      `).join('') : '<p style="color: var(--otl-muted); font-size: 0.875rem; font-style: italic;">No documents yet</p>';

      document.getElementById('detail-title').textContent = grant.name;
      document.getElementById('detail-content').innerHTML = `

          <div class="detail-item">
            <div class="detail-label">Funder</div>

          </div>
          <div class="detail-item">
            <div class="detail-label">Amount</div>

          </div>
          <div class="detail-item">
            <div class="detail-label">Closing Date</div>
            <div class="detail-value">${new Date(grant.closeDate).toLocaleDateString('en-AU')}</div>
          </div>

            <div class="detail-label">Eligibility</div>

          </div>
        </div>

        <div class="detail-section">
          <h3>Eligibility Criteria</h3>

        </div>

        <div class="detail-section">
          <h3>Assessment Criteria</h3>
          <p>${grant.assessmentCriteria || 'No assessment criteria recorded.'}</p>
        </div>

        ${grant.description ? `
        <div class="detail-section">
          <h3>Description</h3>
          <p>${grant.description}</p>
        </div>
        ` : ''}

        ${grant.notes ? `
        <div class="detail-section">
          <h3>Notes</h3>
          <p>${grant.notes}</p>
        </div>
        ` : ''}

        <div class="doc-section">
          <h3 class="doc-section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            Application Documents

          <div class="doc-list" id="doc-list">
            ${docsHtml}
          </div>
          <div class="doc-add" onclick="addDocumentPrompt()">
            + Add document reference

          <p style="font-size: 0.75rem; color: var(--otl-muted); margin-top: 0.5rem;">
            Note: Tracks document names. Store actual files in your Documents folder.

      `;

      document.getElementById('detail-modal').classList.add('active');
    }

    function addDocumentPrompt() {
      const name = prompt('Enter document name:');
      if (name && viewingId) {
        const grant = grants.find(g => g.id === viewingId);
        if (grant) {
          grant.documents = grant.documents || [];
          grant.documents.push(name);
          localStorage.setItem('grants', JSON.stringify(grants));
          viewGrant(viewingId);
        }
      }
    }

    function removeDocument(docName) {
      if (viewingId && confirm('Remove this document?')) {
        const grant = grants.find(g => g.id === viewingId);
        if (grant && grant.documents) {
          grant.documents = grant.documents.filter(d => d !== docName);
          localStorage.setItem('grants', JSON.stringify(grants));
          viewGrant(viewingId);
        }
      }
    }

    function setupEventListeners() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentTab = tab.dataset.tab;
          document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
          document.getElementById(currentTab + '-view').style.display = 'block';
        });
      });

      document.querySelectorAll('.btn-filter').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          renderGrants();
        });
      });

      document.getElementById('add-grant-btn').addEventListener('click', () => {
        editingId = null;
        document.getElementById('grant-form').reset();
        document.querySelector('.modal-title').textContent = 'Add Grant';
        document.getElementById('grant-modal').classList.add('active');
      });

      document.getElementById('close-modal').addEventListener('click', () => {
        document.getElementById('grant-modal').classList.remove('active');
      });

      document.getElementById('cancel-btn').addEventListener('click', () => {
        document.getElementById('grant-modal').classList.remove('active');
      });

      document.getElementById('save-btn').addEventListener('click', saveGrant);

      document.getElementById('close-detail-modal').addEventListener('click', () => {
        document.getElementById('detail-modal').classList.remove('active');
        viewingId = null;
      });

      document.getElementById('detail-edit-btn').addEventListener('click', () => {
        document.getElementById('detail-modal').classList.remove('active');
        if (viewingId) editGrant(viewingId);
      });

      document.getElementById('detail-track-btn').addEventListener('click', () => {
        if (viewingId) addToPipeline(viewingId);
      });

      document.getElementById('grant-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('grant-modal')) {
          document.getElementById('grant-modal').classList.remove('active');
        }
      });

      document.getElementById('detail-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('detail-modal')) {
          document.getElementById('detail-modal').classList.remove('active');
          viewingId = null;
        }
      });
    }

    function saveGrant() {
      const form = document.getElementById('grant-form');
      const grant = {
        id: editingId || Date.now(),
        name: form.name.value,
        funder: form.funder.value,
        category: form.category.value,
        eligibility: form.eligibility.value,
        eligibilityDetails: form.eligibilityDetails.value,
        assessmentCriteria: form.assessmentCriteria.value,
        amount: form.amount.value || 'TBA',
        openDate: form.openDate.value,
        closeDate: form.closeDate.value,
        status: form.status.value,
        description: form.description.value,
        url: form.url.value,
        notes: form.notes.value,
        documents: editingId ? (grants.find(g => g.id === editingId)?.documents || []) : []
      };

      if (!grant.name || !grant.funder || !grant.closeDate) {
        alert('Please fill required fields');
        return;
      }

      if (editingId) {
        const idx = grants.findIndex(g => g.id === editingId);
        if (idx !== -1) grants[idx] = grant;
      } else {
        grants.push(grant);
      }

      localStorage.setItem('grants', JSON.stringify(grants));
      updateStats();
      renderGrants();
      renderPipeline();
      renderCalendar();
      document.getElementById('grant-modal').classList.remove('active');
    }

    window.editGrant = function(id) {
      const grant = grants.find(g => g.id === id);
      if (!grant) return;
      editingId = id;
      document.querySelector('.modal-title').textContent = 'Edit Grant';

      const form = document.getElementById('grant-form');
      form.name.value = grant.name;
      form.funder.value = grant.funder;
      form.category.value = grant.category;
      form.eligibility.value = grant.eligibility || 'nfp';
      form.amount.value = grant.amount;
      form.openDate.value = grant.openDate || '';
      form.closeDate.value = grant.closeDate;
      form.status.value = grant.status;
      form.description.value = grant.description || '';
      form.eligibilityDetails.value = grant.eligibilityDetails || '';
      form.assessmentCriteria.value = grant.assessmentCriteria || '';
      form.url.value = grant.url || '';
      form.notes.value = grant.notes || '';

      document.getElementById('grant-modal').classList.add('active');
    };

    window.addToPipeline = function(id) {
      const grant = grants.find(g => g.id === id);
      if (grant) {
        grant.status = 'draft';
        localStorage.setItem('grants', JSON.stringify(grants));
        updateStats();
        renderGrants();
        renderPipeline();
        alert('Added to pipeline!');
      }
    };

    window.updateStatus = function(id, status) {
      const grant = grants.find(g => g.id === id);
      if (grant) {
        grant.status = status;
        if (status === 'submitted') grant.submittedDate = new Date().toISOString().split('T')[0];
        localStorage.setItem('grants', JSON.stringify(grants));
        updateStats();
        renderGrants();
        renderPipeline();
      }
    };

    window.copyTemplate = function(id) {
      const template = grantTemplates.find(t => t.id === id);
      if (template) {
        const text = template.name + '\n\n' + template.sections.map((s, i) => `${i+1}. ${s}`).join('\n') + '\n\nTips: ' + template.tips;
        navigator.clipboard.writeText(text).then(() => alert('Copied!'));
      }
    };

    window.copyUnsolicitedTemplate = function() {
      const text = `UNSOLICITED PROPOSAL TEMPLATE

${unsolicitedProposal.title}
${unsolicitedProposal.description}

TARGET AGENCIES:
${unsolicitedProposal.targetAgencies.map(a => `- ${a.name}: ${a.focus}`).join('\n')}

REQUIREMENTS:
${unsolicitedProposal.requirements.map(r => `- ${r}`).join('\n')}

PROPOSAL STRUCTURE:
${unsolicitedProposal.sections.map((s, i) => `${i+1}. ${s}`).join('\n')}

PROCESS:
${unsolicitedProposal.process.map((p, i) => `${i+1}. ${p}`).join('\n')}

YOUR ANGLE:
${unsolicitedProposal.tips}`;
      navigator.clipboard.writeText(text).then(() => alert('Full template copied!'));
    };

    window.viewGrant = viewGrant;
    window.removeDocument = removeDocument;

    init();
  </script>
</body>
</html>
